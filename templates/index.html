<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Numerador PDF</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    body{
      margin:0; min-height:100vh;
      background: radial-gradient(circle at 20% 10%, #2b2b3a 0%, #0b0b10 55%, #050507 100%);
      color:#eaeaf2;
    }
    header{
      padding:18px 26px;
      display:flex; align-items:center; gap:10px;
      color:#eaeaf2; opacity:.95;
    }
    header .logo{
      width:34px;height:34px;border-radius:10px;
      background: linear-gradient(135deg,#6f7cff,#a78bfa);
      display:grid; place-items:center; font-weight:700;
      box-shadow:0 8px 30px rgba(120,120,255,.25);
    }
    header h1{font-size:18px;margin:0;font-weight:600}
    .wrap{
      display:grid;
      grid-template-columns: 340px 1fr;
      gap:26px;
      padding: 0 26px 26px;
    }
    .panel{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:18px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }
    .panel h2{
      margin:0 0 14px;
      font-size:16px; font-weight:600;
      display:flex; align-items:center; gap:10px;
    }
    .field{margin:12px 0}
    .field label{display:block;font-size:12px;opacity:.85;margin-bottom:6px}
    .field input, .field select{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      color:#eaeaf2;
      outline:none;
    }
    .btn{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:none;
      background: linear-gradient(135deg,#6f7cff,#a78bfa);
      color:white;
      font-weight:600;
      cursor:pointer;
      transition:.2s;
      box-shadow: 0 10px 25px rgba(167,139,250,.25);
    }
    .btn:disabled{
      opacity:.45; cursor:not-allowed; box-shadow:none;
    }
    .btn:hover{transform: translateY(-1px)}
    .btn2{
      width:100%;
      padding:11px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color:#eaeaf2;
      cursor:pointer;
      margin-top:10px;
    }

    .drop{
      background: rgba(255,255,255,.05);
      border: 2px dashed rgba(255,255,255,.18);
      border-radius:22px;
      min-height: 420px;
      display:grid;
      place-items:center;
      padding:30px;
      position:relative;
      overflow:hidden;
    }
    .drop .inner{
      text-align:center;
      max-width:420px;
    }
    .icon{
      width:56px;height:56px;border-radius:18px;
      display:grid;place-items:center;
      margin:0 auto 14px;
      background: rgba(111,124,255,.16);
      border:1px solid rgba(111,124,255,.35);
    }
    .title{font-weight:600; font-size:18px; margin:0 0 6px}
    .sub{opacity:.8; font-size:12px; margin:0 0 18px}
    .pick{
      display:inline-block;
      padding:10px 14px;
      border-radius:12px;
      background: rgba(111,124,255,.22);
      border: 1px solid rgba(111,124,255,.35);
      cursor:pointer;
      user-select:none;
      font-weight:600;
    }
    .filehint{
      margin-top:14px;
      font-size:12px;
      opacity:.85;
    }
    .badge{
      display:inline-block;
      margin-top:10px;
      padding:6px 10px;
      border-radius:999px;
      background: rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.12);
      font-size:12px;
    }
    @media (max-width: 980px){
      .wrap{grid-template-columns:1fr}
      .drop{min-height:360px}
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">📄</div>
    <h1>Numerador PDF</h1>
  </header>

  <div class="wrap">
    <!-- PANEL IZQUIERDO -->
    <div class="panel">
      <h2>⚙️ Configuración</h2>

      <form id="form" method="POST" enctype="multipart/form-data">
        <div class="field">
          <label>Número inicial</label>
          <input type="number" name="numero_inicial" value="1" min="0" required>
        </div>

        <div class="field">
          <label>Formato de numeración</label>
          <select name="digitos">
            <option value="7" selected>7 dígitos (0000001)</option>
            <option value="6">6 dígitos (000001)</option>
            <option value="5">5 dígitos (00001)</option>
            <option value="4">4 dígitos (0001)</option>
          </select>
        </div>

        <div class="field">
          <label>Dirección</label>
          <select name="direccion">
            <option value="desde_ultima" selected>Desde la última página</option>
            <option value="desde_primera">Desde la primera página</option>
          </select>
        </div>

        <input id="pdfInput" type="file" name="pdf" accept="application/pdf" hidden required>

        <button id="submitBtn" class="btn" type="submit" disabled>Aplicar y Descargar</button>
        <button id="resetBtn" class="btn2" type="button">Reiniciar</button>
      </form>
    </div>

    <!-- ZONA DRAG & DROP -->
    <div id="drop" class="drop">
      <div class="inner">
        <div class="icon">⬆️</div>
        <p class="title">Sube tu documento PDF</p>
        <p class="sub">Arrastra y suelta tu PDF aquí o haz clic para seleccionar</p>

        <span id="pickBtn" class="pick">Seleccionar Archivo</span>

        <div class="filehint">
          <span id="fileName" class="badge" style="display:none;"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const drop = document.getElementById("drop");
    const pickBtn = document.getElementById("pickBtn");
    const pdfInput = document.getElementById("pdfInput");
    const submitBtn = document.getElementById("submitBtn");
    const resetBtn = document.getElementById("resetBtn");
    const fileName = document.getElementById("fileName");
    const form = document.getElementById("form");

    function setSelectedFile(file){
      if(!file) return;
      fileName.style.display = "inline-block";
      fileName.textContent = "✅ " + file.name;
      submitBtn.disabled = false;
    }

    pickBtn.addEventListener("click", () => pdfInput.click());
    drop.addEventListener("click", (e) => {
      if(e.target.id !== "submitBtn" && e.target.id !== "resetBtn") pdfInput.click();
    });

    pdfInput.addEventListener("change", () => {
      const file = pdfInput.files[0];
      setSelectedFile(file);
    });

    drop.addEventListener("dragover", (e) => {
      e.preventDefault();
      drop.style.borderColor = "rgba(167,139,250,.6)";
      drop.style.background = "rgba(255,255,255,.07)";
    });

    drop.addEventListener("dragleave", () => {
      drop.style.borderColor = "rgba(255,255,255,.18)";
      drop.style.background = "rgba(255,255,255,.05)";
    });

    drop.addEventListener("drop", (e) => {
      e.preventDefault();
      drop.style.borderColor = "rgba(255,255,255,.18)";
      drop.style.background = "rgba(255,255,255,.05)";

      const file = e.dataTransfer.files[0];
      if(!file) return;

      if(file.type !== "application/pdf"){
        alert("Por favor sube un archivo PDF.");
        return;
      }
      pdfInput.files = e.dataTransfer.files;
      setSelectedFile(file);
    });

    resetBtn.addEventListener("click", () => {
      form.reset();
      pdfInput.value = "";
      fileName.style.display = "none";
      submitBtn.disabled = true;
    });

    // UX: mostrar "Procesando..."
    form.addEventListener("submit", () => {
      submitBtn.disabled = true;
      submitBtn.textContent = "Procesando...";
    });
  </script>
</body>
</html>
